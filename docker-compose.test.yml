services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: research_test
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
